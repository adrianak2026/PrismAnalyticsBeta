name = "prism-analytics"
main = "src/worker/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Static React/Vite dashboard assets.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# D1-only free-tier storage. No account-specific ID is committed.
# Wrangler 4.45+ automatically provisions and binds this database on deploy.
[[d1_databases]]
binding = "DB"
database_name = "prism-analytics-db"
migrations_dir = "migrations"

# Non-secret values only. Leave APP_URL empty for same-origin/reflected CORS.
[vars]
APP_URL = ""
VERSION = "1.0.0"
ENVIRONMENT = "production"

# Optional hardening override (not required for one-click deployment):
# npx wrangler secret put JWT_SECRET
# Without it, a random signing key is safely generated and persisted in D1.

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 50
